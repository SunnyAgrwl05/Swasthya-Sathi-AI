<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg1" cx="15%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#5B8CFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#5B8CFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg2" cx="100%" cy="10%" r="55%">
      <stop offset="0%" stop-color="#22E1B2" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#22E1B2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
