        opacity="0.9"/>

  <!-- feature chips -->
  <g font-family="Inter, sans-serif" font-size="18" fill="#ffffff">
    <rect x="90" y="580" width="230" height="46" rx="23" fill="url(#cardGlow)" stroke="#1B2433"/>
    <text x="112" y="609">Natural-language attendance</text>

    <rect x="336" y="580" width="200" height="46" rx="23" fill="url(#cardGlow)" stroke="#1B2433"/>
